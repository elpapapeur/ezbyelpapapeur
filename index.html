<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Windows Security Alert</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #c8c8c8;
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 0;
    line-height: 1.5;
  }

  /* Top bar style WannaCry */
  #topbar {
    background: #aa0000;
    color: #fff;
    font-size: 13px;
    font-weight: bold;
    padding: 6px 16px;
    letter-spacing: 1px;
    display: flex;
    justify-content: space-between;
  }

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px 32px;
    gap: 18px;
    overflow: hidden;
  }

  #title-block {
    color: #ff3333;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 2px;
    border-bottom: 1px solid #333;
    padding-bottom: 12px;
    animation: blink-title 1s step-end infinite;
  }

  @keyframes blink-title {
    0%, 100% { color: #ff3333; }
    50% { color: #cc0000; }
  }

  #info-block {
    color: #aaa;
    font-size: 13px;
    line-height: 2;
  }

  #info-block span.val {
    color: #fff;
  }

  #warning-text {
    color: #ff4444;
    font-size: 13px;
    line-height: 1.9;
    border-left: 3px solid #aa0000;
    padding-left: 14px;
  }

  #console-area {
    flex: 1;
    background: #0a0a0a;
    border: 1px solid #2a2a2a;
    padding: 12px 16px;
    overflow: hidden;
    font-size: 12px;
    color: #888;
    line-height: 1.7;
  }

  #console-area .line-err { color: #cc2222; }
  #console-area .line-ok  { color: #666; }
  #console-area .line-enc { color: #aa0000; }

  #bottom-bar {
    background: #0f0f0f;
    border-top: 1px solid #2a2a2a;
    padding: 10px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #555;
  }

  #progress-wrap {
    margin-top: 6px;
  }

  #progress-label {
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }

  #bar-bg {
    background: #1a0000;
    border: 1px solid #550000;
    height: 16px;
    width: 100%;
  }

  #bar-fill {
    background: #aa0000;
    height: 100%;
    width: 0%;
    transition: width 0.4s linear;
  }

  #bar-pct {
    font-size: 11px;
    color: #666;
    margin-top: 2px;
    text-align: right;
  }

  #eol-msg {
    display: none;
    color: #ff3333;
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 2px;
    margin-top: 10px;
    animation: blink-title 0.6s step-end infinite;
  }

  #cursor {
    display: inline-block;
    width: 8px;
    height: 13px;
    background: #888;
    vertical-align: middle;
    animation: blink-cur 0.7s step-end infinite;
  }
  @keyframes blink-cur { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
